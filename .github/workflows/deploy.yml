name: Deploy to EdgeOne Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to EdgeOne Pages
        uses: TencentCloud/edgeone-pages-action@v1
        with:
          secret-id: ${{ secrets.EDGEONE_SECRET_ID }}
          secret-key: ${{ secrets.EDGEONE_SECRET_KEY }}
          zone-id: ${{ secrets.EDGEONE_ZONE_ID }}
          dist-dir: ./dist
