name: Deploy to EdgeOne Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Deploy to EdgeOne Pages
              run: npx edgeone pages deploy ./dist -n take-me-to-a-vup -t ${{ secrets.EDGEONE_API_TOKEN }}
              env:
                  EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
